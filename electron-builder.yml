appId: com.flexv2.meetingcompanion
productName: Anchor
directories:
  output: release
# The main/preload bundles are self-contained (esbuild), so the project's
# node_modules must not be packed into the asar.
files:
  - dist-electron/**
  - package.json
  - "!node_modules/**"
# The Next.js standalone server must stay as plain files (not inside the
# asar archive): its dynamic require() calls fail through asar's patched fs.
# The explicit filter keeps its pruned node_modules, which the default
# matcher would drop.
extraResources:
  - from: .next/standalone
    to: next
    filter:
      - "**/*"
  # electron-builder's copier always skips node_modules inside a file set,
  # so the standalone server's pruned node_modules ships as its own entry.
  - from: .next/standalone/node_modules
    to: next/node_modules
    filter:
      - "**/*"
asar: true
linux:
  target:
    - AppImage
    - deb
  category: Utility
mac:
  target:
    - dmg
  category: public.app-category.productivity
win:
  target:
    - nsis
